# Telugu QA System - Training Configuration
# Optimized for Google Colab Free Tier (T4 GPU, 15GB VRAM)

# Data paths (relative to project root)
data:
  train_file: "data/processed/tequad_train.json"
  validation_file: "data/processed/tequad_validation.json"
  test_file: "data/processed/tequad_test_wiki.json"
  
# Training hyperparameters
training:
  # Batch sizes (adjust based on GPU memory)
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 2  # Effective batch size = 8 * 2 = 16
  
  # Learning rate schedule
  learning_rate: 3.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "linear"
  
  # Training duration
  num_train_epochs: 3
  max_steps: -1  # -1 means use num_train_epochs
  
  # Evaluation strategy
  evaluation_strategy: "steps"
  eval_steps: 1000
  save_strategy: "steps"
  save_steps: 1000
  save_total_limit: 2  # Keep only best 2 checkpoints
  
  # Early stopping
  load_best_model_at_end: true
  metric_for_best_model: "f1"
  greater_is_better: true
  
  # Optimization
  fp16: true  # Use mixed precision for faster training
  dataloader_num_workers: 2
  
  # Logging
  logging_steps: 100
  logging_first_step: true
  report_to: "none"  # Can be "wandb" if you want to track

# Tokenization settings (for QA preprocessing)
preprocessing:
  max_seq_length: 384
  doc_stride: 128
  max_query_length: 64
  max_answer_length: 30
  pad_to_max_length: true
  
# Output directories
output:
  output_dir: "models/checkpoints"
  logging_dir: "logs"
  
# Colab-specific settings
colab:
  # Save checkpoints to Google Drive
  save_to_drive: true
  drive_output_dir: "/content/drive/MyDrive/telugu-qa-checkpoints"
  
  # Resume from checkpoint if session disconnects
  resume_from_checkpoint: true
